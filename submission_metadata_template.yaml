ai_usage_summary: |
  Used ChatGPT and DeepSeek for architecture discussion, code review,
  UI design suggestions, and debugging assistance. GitHub Copilot used
  for Python code autocompletion during development.
  
  No candidate data or hackathon dataset content was shared with any
  external AI service. All assistance limited to code structure,
  design patterns, and debugging only.

# ============================================================================
# APPROACH SUMMARY
# ============================================================================

methodology_summary: |
  9-dimensional cognitive scoring system with rule-based JD intelligence.
  Skills weighted by proficiency, endorsements, and duration. 23 behavioral
  signals inform hiring readiness. Trust engine detects timeline inconsistencies,
  skill inflation, and honeypot patterns. Hidden talent discovered from career
  descriptions. Consulting-only backgrounds penalized per JD requirements.
  Startup mindset scored from company size, role diversity, and engagement.
  Processes 100K candidates in ~28 seconds on CPU only, zero network calls.

